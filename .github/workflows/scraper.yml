name: Actualizar eventos culturales

on:
  schedule:
    - cron: '0 6 * * *'   # Corre todos los días a las 06:00 UTC (03:00 Chile)
  workflow_dispatch:        # También permite ejecutarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper_eventos.py

      - name: Guardar eventos.json en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add eventos.json
          git diff --cached --quiet || git commit -m "Actualizar eventos $(date +'%Y-%m-%d')"
          git push
