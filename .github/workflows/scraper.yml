name: Actualizar eventos culturales

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC = 03:00 Chile (madrugada — datos frescos para el día)
    - cron: '0 17 * * *'   # 17:00 UTC = 14:00 Chile (tarde — captura eventos publicados en el día)
  workflow_dispatch:         # Permite ejecutarlo manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install requests beautifulsoup4 playwright

      - name: Cachear binarios de Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}-v1

      - name: Instalar Chromium para Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Instalar dependencias del sistema para Chromium (si viene de caché)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Ejecutar scraper
        run: python scraper_eventos.py

      - name: Guardar eventos.json en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          cp eventos.json docs/eventos.json
          git add eventos.json docs/eventos.json
          git diff --cached --quiet || git commit -m "Actualizar eventos $(date +'%Y-%m-%d %H:%M UTC')"
          git push
